<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gateway Config</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f5f5;color:#333;min-height:100vh}
.header{background:#fff;border-bottom:1px solid #e0e0e0;padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
.header-left{display:flex;align-items:center;gap:12px}
.header h1{font-size:18px;font-weight:600;color:#1a1a1a}
.header .dot{width:8px;height:8px;border-radius:50%;background:#4caf50}
.header .dot.offline{background:#e74c3c}
.container{max-width:600px;margin:24px auto;padding:0 16px}
.card{background:#fff;border-radius:12px;border:1px solid #e8e8e8;margin-bottom:16px;overflow:hidden}
.card-header{padding:14px 20px;border-bottom:1px solid #f0f0f0;font-size:13px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.5px}
.card-body{padding:20px}
.field{margin-bottom:16px}
.field:last-child{margin-bottom:0}
.field label{display:block;font-size:13px;color:#666;margin-bottom:6px;font-weight:500}
.field input{width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none;transition:border-color .2s}
.field input:focus{border-color:#4a90d9;box-shadow:0 0 0 3px rgba(74,144,217,0.1)}
.field input:read-only{background:#f8f9fa;color:#999}
.row{display:flex;gap:12px}
.row .field{flex:1}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 24px;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;width:100%}
.btn-primary{background:#4a90d9;color:#fff}
.btn-primary:hover{background:#3a7bc8}
.btn-danger{background:#e74c3c;color:#fff}
.btn-danger:hover{background:#c0392b}
.btn:disabled{opacity:.5;cursor:not-allowed}
.status-bar{padding:12px 16px;background:#f8f9fa;border-radius:8px;font-size:13px;color:#666;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.status-bar .label{color:#999}
.status-bar .value{color:#333;font-weight:500}
.toast{position:fixed;top:20px;right:20px;background:#333;color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:100}
.toast.show{opacity:1}
.toast.success{background:#4caf50}
.toast.error{background:#e74c3c}
.fw-area{border:2px dashed #ddd;border-radius:8px;padding:32px;text-align:center;cursor:pointer;transition:all .2s}
.fw-area:hover{border-color:#4a90d9;background:#f8fbff}
.fw-area.active{border-color:#4a90d9;background:#f0f7ff}
.fw-area p{color:#999;font-size:14px}
.fw-area .filename{color:#333;font-weight:500;margin-bottom:8px}
.progress{height:6px;background:#eee;border-radius:3px;margin-top:16px;overflow:hidden;display:none}
.progress .bar{height:100%;background:linear-gradient(90deg,#4a90d9,#3a7bc8);width:0;transition:width .3s;border-radius:3px}
.fw-info{margin-top:12px;font-size:12px;color:#999;text-align:center}
.divider{height:1px;background:#f0f0f0;margin:16px 0}
.footer{text-align:center;padding:24px 0;font-size:12px;color:#bbb}
</style>
</head>
<body>
<div class="header">
<div class="header-left">
<div class="dot" id="dot"></div>
<h1>Gateway</h1>
</div>
<span id="version" style="font-size:12px;color:#bbb"></span>
</div>
<div class="container">

<div class="status-bar" id="status">
<span class="label">Status:</span><span class="value" id="st">Connecting...</span>
<span class="label" style="margin-left:12px">IP:</span><span class="value" id="stip">-</span>
<span class="label" style="margin-left:12px">Uptime:</span><span class="value" id="stup">-</span>
</div>

<!-- Network -->
<div class="card">
<div class="card-header">Network</div>
<div class="card-body">
<div class="row">
<div class="field"><label>IP Address</label><input id="ip" placeholder="192.168.1.100"></div>
<div class="field"><label>Subnet Mask</label><input id="mask" placeholder="255.255.255.0"></div>
</div>
<div class="row">
<div class="field"><label>Gateway</label><input id="gw" placeholder="192.168.1.1"></div>
<div class="field"><label>UDP Port</label><input id="port" type="number" placeholder="9000"></div>
</div>
<div class="divider"></div>
<button class="btn btn-primary" onclick="saveNetwork()">Apply Network Settings</button>
</div>
</div>

<!-- nRF24 -->
<div class="card">
<div class="card-header">nRF24L01+</div>
<div class="card-body">
<div class="row">
<div class="field"><label>Channel (0-125)</label><input id="rf24ch" type="number" placeholder="76"></div>
<div class="field"><label>Address (10 hex chars, read-only)</label><input id="rf24addr" readonly></div>
</div>
<button class="btn btn-primary" onclick="saveRF24()">Apply RF24 Settings</button>
</div>
</div>

<!-- Firmware -->
<div class="card">
<div class="card-header">Firmware Update</div>
<div class="card-body">
<div class="fw-area" id="fwarea" onclick="document.getElementById('fwfile').click()">
<p id="fwtext">Click to select firmware file (.bin)</p>
</div>
<input type="file" id="fwfile" accept=".bin,.hex" style="display:none" onchange="selectFile(this)">
<div class="progress" id="prog"><div class="bar" id="bar"></div></div>
<div class="fw-info" id="fwinfo"></div>
<div style="margin-top:12px">
<button class="btn btn-primary" id="btnUpload" onclick="uploadFw()" disabled>Upload Firmware</button>
</div>
</div>
</div>

<!-- System -->
<div class="card">
<div class="card-header">System</div>
<div class="card-body">
<button class="btn btn-danger" onclick="reboot()">Reboot Device</button>
</div>
</div>

<div class="footer">Gateway v<span id="ver"></span></div>
</div>

<div class="toast" id="toast"></div>

<script>
var fwData=null;

function toast(msg,type){
var t=document.getElementById('toast');
t.textContent=msg;t.className='toast show'+(type?' '+type:'');
setTimeout(function(){t.className='toast'},3000);
}

function loadConfig(){
fetch('/api/config').then(function(r){return r.json()}).then(function(d){
document.getElementById('dot').className='dot';
document.getElementById('st').textContent='Online';
document.getElementById('stip').textContent=d.ip;
document.getElementById('ip').value=d.ip||'';
document.getElementById('mask').value=d.mask||'';
document.getElementById('gw').value=d.gw||'';
document.getElementById('port').value=d.udp_port||9000;
document.getElementById('rf24ch').value=d.rf24_ch!=null?d.rf24_ch:76;
document.getElementById('rf24addr').value=d.rf24_addr||'';
if(d.version)document.getElementById('ver').textContent=d.version;
}).catch(function(){
document.getElementById('dot').className='dot offline';
document.getElementById('st').textContent='Offline';
});
}

function saveNetwork(){
var data=JSON.stringify({
ip:document.getElementById('ip').value,
netmask:document.getElementById('mask').value,
gateway:document.getElementById('gw').value,
udp_port:parseInt(document.getElementById('port').value)||9000
});
var btn=event.target;btn.disabled=true;btn.textContent='Saving...';
fetch('/api/config',{method:'POST',headers:{'Content-Type':'application/json'},body:data})
.then(function(r){return r.json()}).then(function(){
toast('Network settings saved. Reboot to apply.','success');
loadConfig();
}).catch(function(){toast('Save failed','error')
}).finally(function(){btn.disabled=false;btn.textContent='Apply Network Settings'});
}

function saveRF24(){
var data=JSON.stringify({
rf24_ch:parseInt(document.getElementById('rf24ch').value)||76
});
var btn=event.target;btn.disabled=true;btn.textContent='Saving...';
fetch('/api/config',{method:'POST',headers:{'Content-Type':'application/json'},body:data})
.then(function(r){return r.json()}).then(function(){
toast('RF24 settings saved and applied','success');
loadConfig();
}).catch(function(){toast('Save failed','error')
}).finally(function(){btn.disabled=false;btn.textContent='Apply RF24 Settings'});
}

function selectFile(input){
var file=input.files[0];
if(!file)return;
document.getElementById('fwarea').className='fw-area active';
document.getElementById('fwtext').innerHTML='<div class="filename">'+file.name+'</div><p>'+formatSize(file.size)+'</p>';
document.getElementById('fwinfo').textContent='';
var reader=new FileReader();
reader.onload=function(e){fwData=new Uint8Array(e.target.result);document.getElementById('btnUpload').disabled=false;};
reader.readAsArrayBuffer(file);
}

function formatSize(b){if(b>1048576)return(b/1048576).toFixed(1)+' MB';return(b/1024).toFixed(1)+' KB';}

function uploadFw(){
if(!fwData){toast('No file selected','error');return;}
if(!confirm('Upload firmware? Device will reboot after update.'))return;
var bar=document.getElementById('bar');
var prog=document.getElementById('prog');
var info=document.getElementById('fwinfo');
var btn=document.getElementById('btnUpload');
prog.style.display='block';btn.disabled=true;btn.textContent='Uploading...';
var offset=0;var chunk=256;var total=fwData.length;
function sendNext(){
if(offset>=total){
bar.style.width='100%';
info.textContent='Upload complete. Rebooting...';
toast('Firmware uploaded successfully','success');
setTimeout(function(){location.reload()},5000);
return;
}
var end=Math.min(offset+chunk,total);
var part=fwData.slice(offset,end);
fetch('/api/firmware',{method:'POST',headers:{'Content-Type':'application/octet-stream'},body:part})
.then(function(r){return r.json()}).then(function(d){
var pct=Math.round(end/total*100);
bar.style.width=pct+'%';
info.textContent=pct+'% ('+formatSize(end)+' / '+formatSize(total)+')';
offset=end;sendNext();
}).catch(function(){
toast('Upload failed at '+formatSize(offset),'error');
btn.disabled=false;btn.textContent='Retry Upload';
});
}
sendNext();
}

function reboot(){
if(!confirm('Reboot device now?'))return;
fetch('/api/reboot',{method:'POST'}).then(function(){
toast('Rebooting...','success');
setTimeout(function(){location.reload()},5000);
}).catch(function(){toast('Reboot failed','error')});
}

loadConfig();
setInterval(loadConfig,5000);
</script>
</body>
</html>
