# Gateway application configuration

CONFIG_MAIN_STACK_SIZE=1024
CONFIG_SHELL=n
CONFIG_SERIAL=y
CONFIG_GPIO=y
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_BUFFER_SIZE=512

# CAN
CONFIG_CAN=y

# SPI + nRF24L01P
CONFIG_SPI=y
CONFIG_NRF24L01P=y

# SPI Flash (MCUBoot)
CONFIG_FLASH=y
CONFIG_SPI_NOR_SFDP_MINIMAL=n
CONFIG_SPI_NOR_FLASH_LAYOUT_PAGE_SIZE=4096
CONFIG_FLASH_MAP=y
CONFIG_IMG_MANAGER=y
CONFIG_STREAM_FLASH=y
CONFIG_REBOOT=y

# CRC
CONFIG_CRC=y

# Settings persistent storage
CONFIG_SETTINGS=y
CONFIG_SETTINGS_RUNTIME=y
CONFIG_FCB=y

# Networking - minimal for 48KB RAM
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_UDP=y
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y
CONFIG_POSIX_API=y
CONFIG_NET_MAX_CONN=3
CONFIG_NET_MAX_CONTEXTS=3
CONFIG_ZVFS_POLL_MAX=3
CONFIG_NET_BUF_DATA_SIZE=64
CONFIG_NET_BUF_RX_COUNT=2
CONFIG_NET_BUF_TX_COUNT=2
CONFIG_TEST_RANDOM_GENERATOR=y
CONFIG_NET_CONNECTION_MANAGER=y
CONFIG_NET_SHELL=n
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=512
CONFIG_NET_TX_STACK_SIZE=512
CONFIG_NET_RX_STACK_SIZE=512

# HTTP Server - minimal for 48KB RAM
CONFIG_HTTP_PARSER=y
CONFIG_HTTP_PARSER_URL=y
CONFIG_HTTP_SERVER=y
CONFIG_HTTP_SERVER_MAX_CLIENTS=1
CONFIG_EVENTFD=y
CONFIG_JSON_LIBRARY=y
