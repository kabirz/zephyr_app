# Gateway application configuration

CONFIG_MAIN_STACK_SIZE=1024
CONFIG_SHELL=y
CONFIG_SERIAL=y
CONFIG_GPIO=y
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_BUFFER_SIZE=512

# CAN
CONFIG_CAN=y

# CAN Firmware Upgrade Library
CONFIG_CAN_FW_UPGRADE=y

# SPI + nRF24L01P
CONFIG_SPI=y
CONFIG_NRF24L01P=y

# SPI Flash (MCUBoot)
CONFIG_FLASH=y
CONFIG_SPI_NOR_SFDP_MINIMAL=n
CONFIG_SPI_NOR_FLASH_LAYOUT_PAGE_SIZE=4096
CONFIG_FLASH_MAP=y
CONFIG_IMG_MANAGER=y
CONFIG_STREAM_FLASH=y
CONFIG_REBOOT=y

# CRC
CONFIG_CRC=y

# Settings persistent storage
CONFIG_SETTINGS=y
CONFIG_SETTINGS_RUNTIME=y
CONFIG_FCB=y

# Networking (UDP via W5500) — 由 snippet `gateway_eth` 控制 (见 snippets/gateway_eth/)
# 手柄板 (默认) 无网络: gateway 作为纯 nRF24 <-> CAN 桥
