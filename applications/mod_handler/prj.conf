CONFIG_MAIN_STACK_SIZE=2048
# shell
CONFIG_SHELL=y
CONFIG_FLASH_MAP_SHELL=y
CONFIG_FLASH_SHELL=y

CONFIG_SERIAL=y
CONFIG_GPIO=y
CONFIG_LOG=y

# can
CONFIG_CAN=y
CONFIG_CAN_SHELL=y
CONFIG_CAN_FW_UPGRADE=y

# spi + nRF24L01+ 2.4G 无线
CONFIG_SPI=y
CONFIG_NRF24L01P=y

# adc
CONFIG_ADC=y

# img
CONFIG_IMG_MANAGER=y
CONFIG_STREAM_FLASH=y

# reboot
CONFIG_REBOOT=y

# i2c
CONFIG_I2C=y

#CRC
CONFIG_CRC=y

# display
CONFIG_DISPLAY=y
# CONFIG_CHARACTER_FRAMEBUFFER=y

# Settings persistent storage (FCB backend)
CONFIG_SETTINGS=y
CONFIG_SETTINGS_RUNTIME=y
CONFIG_FCB=y

# PM
CONFIG_PM=y
CONFIG_PM_DEVICE=y
CONFIG_PM_DEVICE_SYSTEM_MANAGED=y
CONFIG_PM_DEVICE_SHELL=y

# Display layout
CONFIG_MOD_HANDLER_ROW0_ASCII=y
CONFIG_MOD_HANDLER_SCANNER_8X16=y
# CONFIG_MOD_HANDLER_SHOW_XYZ is not set
