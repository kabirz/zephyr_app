# USB device stack (new experimental stack)
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_UDC_DRIVER=y

# Zephyr built-in CMSIS-DAP subsystem
CONFIG_DAP=y
CONFIG_DAP_BACKEND_USB=y

# CDC ACM (serial bridge)
CONFIG_USBD_CDC_ACM_CLASS=y
CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=n
CONFIG_UART_LINE_CTRL=y
CONFIG_UART_USE_RUNTIME_CONFIGURE=y

# UART bridge (CDC ACM <-> target USART)
CONFIG_UART_BRIDGE=y

# Basic drivers
CONFIG_GPIO=y
CONFIG_SERIAL=y

# Memory optimization (48KB RAM on STM32F103RCT6)
CONFIG_MAIN_STACK_SIZE=1024
CONFIG_HEAP_MEM_POOL_SIZE=256

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
